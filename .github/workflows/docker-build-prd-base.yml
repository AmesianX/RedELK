name: Build docker base image (prd)

on:
  push:
    tags:
      - "*"
    paths:
      - "*"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Prepare
        id: prepare
        run: |
          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          {
            echo "build_args<<EOF"
            echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "VCS_REF=${GITHUB_SHA::8}"
            echo "EOF"
          } >> $GITHUB_OUTPUT
        env:
          DOCKER_IMAGE: ${{ vars.DOCKER_REPO || 'outflanknl' }}/redelk-base

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare.outputs.docker_image }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: elkserver/docker/redelk-base
          file: ./elkserver/docker/redelk-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: ${{ steps.prepare.outputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
